server:
  port: 8080

spring:
  profiles:
    active: file
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

app:
  storage:
    path: ./data
  cors:
    origins: http://localhost:5173,http://localhost:3000,http://localhost:3001

# Node.js Bridge Configuration for Claude CLI integration
# The bridge uses native spawn() with stream-json output, bypassing PTY compatibility issues
bridge:
  enabled: true
  host: 127.0.0.1
  port: 3002
  # Timeout for HTTP requests to bridge (in milliseconds)
  timeout: 10000
